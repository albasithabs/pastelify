<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pastelify – Affiliate Product Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            heading: ['"Playfair Display"', 'serif'],
          },
          colors: {
            boutique: {
              bg: '#FCF9FA',      // Soft pastel background
              ivory: '#FFFFFF',   // Clean white for cards
              blush: '#FCE7F3',   // Soft pink for accents (pink-100)
              lilac: '#FBCFE8',   // Slightly deeper pink (pink-200)
              border: '#F9A8D4',  // Pink borders (pink-300)
              text: '#4C1D95',    // Deep purple-pink for text (violet-900)
              muted: '#9CA3AF',   // Gray for secondary text
              mauve: '#EC4899',   // Vibrant pink for primary actions (pink-500)
              plum: '#BE185D',    // Deep pink for hover states (pink-700)
            }
          }
        }
      }
    }
  </script>
  <style>
    /* Professional Smooth Mesh Gradient - Boutique Studio */
    body {
        background-color: #FCF9FA;
        color: #4C1D95;
        font-family: 'Inter', sans-serif;
    }
    .mesh-bg {
        display: none; /* Removed mesh bg to match the clean mockup */
    }

    /* Sleek Scrollbar */
    ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
    }
    ::-webkit-scrollbar-track {
        background: transparent; 
    }
    ::-webkit-scrollbar-thumb {
        background: #FBCFE8; 
        border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
        background: #F9A8D4; 
    }
  </style>
<script type="importmap">
{
  "imports": {
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.28.0",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="text-boutique-text antialiased selection:bg-boutique-blush selection:text-boutique-mauve">
  <div class="mesh-bg"></div>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
