<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pastelify – Affiliate Product Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            heading: ['"Playfair Display"', 'serif'],
          },
          colors: {
            boutique: {
              bg: '#0A0A0A',
              ivory: '#171717',
              blush: '#262626',
              lilac: '#404040',
              border: '#262626',
              text: '#F9FAFB',
              muted: '#A3A3A3',
              mauve: '#8B5CF6',
              plum: '#7C3AED',
            }
          }
        }
      }
    }
  </script>
  <style>
    /* Professional Smooth Mesh Gradient - Boutique Studio */
    body {
        background-color: #0A0A0A;
        color: #F9FAFB;
        font-family: 'Inter', sans-serif;
    }
    .mesh-bg {
        display: none; /* Removed mesh bg to match the clean mockup */
    }

    /* Sleek Scrollbar */
    ::-webkit-scrollbar {
        width: 4px;
        height: 4px;
    }
    ::-webkit-scrollbar-track {
        background: transparent; 
    }
    ::-webkit-scrollbar-thumb {
        background: #E8DFE5; 
        border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
        background: #D1C5CE; 
    }
  </style>
<script type="importmap">
{
  "imports": {
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.28.0",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="text-boutique-text antialiased selection:bg-boutique-blush selection:text-boutique-mauve">
  <div class="mesh-bg"></div>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
